
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calcula tu futuro</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>

:root{
--bg:#eef1f5;
--card:#ffffff;
--primary:#1f2a44;
--text:#1a1a1a;
--muted:#6b7280;
--border:#e3e6ec;
--green:#1f9d8a;
--red:#d64545;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:var(--bg);
color:var(--text);
}

.wrap{
max-width:900px;
margin:auto;
padding:25px;
}

.card{
background:var(--card);
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
padding:25px;
margin-bottom:20px;
}

h1{
margin:0 0 20px 0;
font-size:32px;
color:var(--primary);
}

.section{
margin-top:30px;
}

.label{
font-weight:600;
margin-bottom:6px;
}

.help{
font-size:13px;
color:var(--muted);
margin-bottom:10px;
}

input,select{
width:100%;
padding:14px;
font-size:16px;
border-radius:8px;
border:1px solid var(--border);
margin-bottom:15px;
}

button{
padding:14px 20px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.btn-red{
background:var(--red);
color:white;
}

.btn-green{
background:var(--green);
color:white;
}

.buttons{
display:flex;
gap:15px;
}

.results{
display:none;
}

.big-result{
font-size:36px;
font-weight:800;
margin-top:10px;
}

.chart-box{
margin-top:20px;
}

canvas{
width:100%;
height:320px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid var(--border);
}

th{
background:#f3f4f7;
}

.toggle{
margin-top:20px;
}

</style>

</head>

<body>

<div class="wrap">

<div class="card" id="form">

<h1>Calculadora de interés compuesto</h1>

<div class="section">
<div class="label">Inversión inicial</div>
<div class="help">Monto inicial disponible para invertir.</div>
<input id="initial" type="number" value="1100">
</div>

<div class="section">
<div class="label">Contribución mensual</div>
<input id="monthly" type="number" value="1000">

<div class="label">Aumento anual de contribución (%)</div>
<input id="increase" type="number" value="10">

<div class="label">Años</div>
<input id="years" type="number" value="15">
</div>

<div class="section">
<div class="label">Tasa anual (%)</div>
<input id="rate" type="number" value="15">

<div class="label">Frecuencia de capitalización</div>
<select id="compound">
<option value="12">Mensual</option>
<option value="4">Trimestral</option>
<option value="1">Anual</option>
</select>
</div>

<div class="buttons">
<button class="btn-red" onclick="calculate()">CALCULAR</button>
<button class="btn-green" onclick="resetCalc()">RESTABLECER</button>
</div>

</div>

<div class="card results" id="results">

<h1>Resultados</h1>

<div>En <span id="yearsOut"></span> años tendrás</div>
<div class="big-result" id="final"></div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<div class="toggle">
<button onclick="toggleTable()">SHOW TABLE</button>
</div>

<div id="tableBox" style="display:none;margin-top:20px;">
<table>
<thead>
<tr>
<th>Año</th>
<th>Valor futuro</th>
<th>Contribuciones</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

</div>

<script>

function money(x){
return x.toLocaleString('en-US',{style:'currency',currency:'USD'})
}

function calculate(){

let P=parseFloat(initial.value)
let PMT=parseFloat(monthly.value)
let inc=parseFloat(increase.value)/100
let years=parseInt(years.value)
let rate=parseFloat(rate.value)/100
let n=parseInt(compound.value)

let r=rate/n

let balance=P
let contrib=P

let dataFV=[]
let dataC=[]
let labels=[]

let tbody=""

for(let y=0;y<=years;y++){

labels.push("Año "+y)
dataFV.push(balance)
dataC.push(contrib)

tbody+=`<tr>
<td>${y}</td>
<td>${money(balance)}</td>
<td>${money(contrib)}</td>
</tr>`

let monthlyAdj=PMT*Math.pow(1+inc,y)

for(let m=0;m<12;m++){

balance+=monthlyAdj
contrib+=monthlyAdj

if((m+1)%(12/n)==0){
balance*=1+r
}

}

}

table.innerHTML=tbody

yearsOut.innerText=years
final.innerText=money(balance)

results.style.display="block"

drawChart(labels,dataFV,dataC)

}

function drawChart(labels,fv,contrib){

let c=document.getElementById("chart")
let ctx=c.getContext("2d")

c.height=320

let max=Math.max(...fv)
let step=300/max

ctx.clearRect(0,0,c.width,c.height)

function line(data,color){

ctx.beginPath()
ctx.strokeStyle=color
ctx.lineWidth=3

data.forEach((v,i)=>{

let x=i*(c.width/(data.length-1))
let y=300-v*step

if(i==0)ctx.moveTo(x,y)
else ctx.lineTo(x,y)

})

ctx.stroke()

}

line(fv,"#d64545")
line(contrib,"#1f9d8a")

}

function toggleTable(){

let box=document.getElementById("tableBox")
box.style.display=box.style.display==="none"?"block":"none"

}

function resetCalc(){

location.reload()

}

</script>

</body>
</html>
