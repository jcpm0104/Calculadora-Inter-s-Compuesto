<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de interés compuesto</title>

<link rel="manifest" href="./manifest.webmanifest?v=2">
<meta name="theme-color" content="#0f5b63">

<link rel="apple-touch-icon" sizes="180x180" href="./icon-192.png?v=2">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">

<style>

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#f3efe6;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:#0f5b63;
padding:20px;
border-radius:6px;
color:white;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:4px;
font-size:16px;
}

button{
margin-top:20px;
padding:12px;
border:none;
border-radius:4px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.calc{
background:#b1362f;
color:white;
}

.reset{
background:#2e7d32;
color:white;
}

.results{
margin-top:25px;
background:white;
padding:20px;
border-radius:6px;
display:none;
}

h1{
margin-top:0;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Calculadora de interés compuesto</h1>

<label>Inversión inicial</label>
<input id="initial" type="number" value="1100">

<label>Contribución mensual</label>
<input id="monthly" type="number" value="1000">

<label>Años</label>
<input id="years" type="number" value="15">

<label>Interés anual (%)</label>
<input id="rate" type="number" value="12">

<button class="calc" onclick="calculate()">CALCULAR</button>
<button class="reset" onclick="resetCalc()">RESET</button>

</div>

<div class="results" id="results">

<h2>Resultado</h2>

<p>Valor futuro:</p>

<h1 id="final">$0</h1>

</div>

</div>

<script>

function money(x){
return x.toLocaleString('en-US',{style:'currency',currency:'USD'})
}

function calculate(){

let P=parseFloat(document.getElementById("initial").value)
let PMT=parseFloat(document.getElementById("monthly").value)
let years=parseFloat(document.getElementById("years").value)
let r=parseFloat(document.getElementById("rate").value)/100

let months=years12
let balance=P

for(let i=0;i<months;i++){

balance+=PMT
balance=1+(r/12)

}

document.getElementById("final").innerText=money(balance)

document.getElementById("results").style.display="block"

}

function resetCalc(){

document.getElementById("initial").value=0
document.getElementById("monthly").value=0
document.getElementById("years").value=0
document.getElementById("rate").value=0

document.getElementById("results").style.display="none"

}

</script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", function () {

navigator.serviceWorker.register("sw.js")

})

}

</script>

</body>
</html>
